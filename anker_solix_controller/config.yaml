name: Anker Solix 4 Pro Controller
version: "1.3.0"
slug: anker_solix_controller
description: >
  Zero-feed-in controller for Anker Solix 4 Pro with Hoymiles HMS inverters (HMS-2000 & HMS-1600).
url: https://github.com/nemex/anker-solix4pro-hms-ha-addon
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
homeassistant_api: true
hassio_api: true
host_network: false
ingress: true
ingress_port: 8766
panel_icon: mdi:solar-power-variant
panel_title: Anker Solix
watchdog: "http://[HOST]:[PORT:8766]/state"
ports:
  8766/tcp: 8766
ports_description:
  8766/tcp: Web UI (direkter Zugriff, optional — Ingress ist aktiv)
options:
  shelly_ip: "192.168.178.98"
  solix_ip: "192.168.178.95"
  grid_sensor: "sensor.shellypro3em_leistung"
  soc_sensor: "sensor.anker_solix_soc"
  hms_2000_entity: "number.hoymiles_hms_2000_4t_limit_nonpersistent_absolute"
  hms_2000_power_sensor: "sensor.hoymiles_hms_2000_4t_power"
  hms_2000_reachable_sensor: "binary_sensor.hoymiles_hms_2000_4t_reachable"
  hms_1600_entity: "number.hoymiles_hms_1600_4t_limit_nonpersistent_absolute"
  hms_1600_power_sensor: "sensor.hoymiles_hms_1600_4t_power"
  hms_1600_reachable_sensor: "binary_sensor.hoymiles_hms_1600_4t_reachable"
  soc_normal_max: 95
  dry_run: true
schema:
  shelly_ip: str
  solix_ip: str
  grid_sensor: str
  soc_sensor: str
  hms_2000_entity: str
  hms_2000_power_sensor: str
  hms_2000_reachable_sensor: str
  hms_1600_entity: str
  hms_1600_power_sensor: str
  hms_1600_reachable_sensor: str
  soc_normal_max: int
  dry_run: bool
